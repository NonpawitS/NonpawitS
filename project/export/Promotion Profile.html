  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

==========================================\n     PAGE — A4 (210mm × 297mm)\n     ============================================================ */\n  .page {\n    width: 210mm;\n    height: 297mm;\n    background: #FFFFFF;\n    box-shadow: 0 6px 40px rgba(0,0,0,0.18);\n    position: relative;\n    overflow: hidden;\n    display: grid;\n    grid-template-columns: 73.5mm 1fr; /* 35% / 65% of 210mm */\n  }\n\n  @media print {\n    body { background: #FFFFFF; padding: 0; display: block; }\n    .page { box-shadow: none; margin: 0; }\n  }\n\n  /* ============================================================\n     TYPE TOKENS\n     ============================================================ */\n  :root {\n    --maroon: #C8102E;\n    --maroon-deep: #9A0C23;\n    --ink: #1A1A1A;\n    --sub: #595959;\n    --rule: #D9D9D9;\n    --sidebar-bg: #F5F2F2;\n\n    --eyebrow: 8pt;\n    --body: 9pt;\n    --section: 11pt;\n    --name: 18pt;\n    --subtitle: 12pt;\n    --title: 24pt;\n  }\n\n  /* ============================================================\n     LEFT SIDEBAR\n     ============================================================ */\n  .sidebar {\n    background: var(--sidebar-bg);\n    padding: 15mm 8mm 15mm 15mm;\n    display: flex;\n    flex-direction: column;\n    gap: 5mm;\n    color: var(--ink);\n  }\n\n  .photo {\n    width: 100px;\n    height: 100px;\n    border: 1px solid var(--maroon);\n    background: #ECECEC;\n    align-self: flex-start;\n    overflow: hidden;\n    position: relative;\n  }\n  .photo img {\n    width: 100%;\n    height: 100%;\n    object-fit: cover;\n    object-position: center 25%;\n    display: block;\n  }\n\n  .ident .name {\n    font-size: var(--name);\n    font-weight: 700;\n    line-height: 1.15;\n    letter-spacing: -0.2px;\n    color: var(--ink);\n  }\n  .ident .role {\n    margin-top: 2.5mm;\n    font-size: 9pt;\n    line-height: 1.45;\n    color: var(--sub);\n  }\n  .ident .role strong {\n    display: block;\n    color: var(--ink);\n    font-weight: 600;\n  }\n\n  .side-section {\n    padding-top: 4mm;\n    border-top: 1px solid var(--rule);\n  }\n  .side-section:first-of-type { /* no top rule above first section after ident */ }\n\n  .side-h {\n    font-size: var(--eyebrow);\n    font-weight: 700;\n    letter-spacing: 2px;\n    color: var(--maroon);\n    text-transform: uppercase;\n    margin-bottom: 3mm;\n  }\n\n  .side-body {\n    font-size: var(--body);\n    line-height: 1.5;\n    color: var(--ink);\n  }\n  .side-body .muted { color: var(--sub); }\n  .side-body p + p { margin-top: 2.2mm; }\n\n  .contact-line { display: block; }\n  .contact-line + .contact-line { margin-top: 0.8mm; }\n\n  .exp-block + .exp-block { margin-top: 3mm; }\n  .exp-block .org { font-weight: 600; color: var(--ink); }\n  .exp-block .pos { color: var(--ink); }\n  .exp-block .yrs { color: var(--sub); font-size: 8.5pt; }\n\n  .comp-row {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    padding: 1.2mm 0;\n    font-size: var(--body);\n    line-height: 1.35;\n  }\n  .comp-row + .comp-row { border-top: 1px dotted #E5E5E5; }\n  .comp-row .lab { color: var(--ink); padding-right: 4mm; }\n  .comp-row .val { color: var(--sub); font-size: 8pt; letter-spacing: 0.3px; white-space: nowrap; }\n  .comp-row .val.high {\n    color: var(--maroon);\n    font-weight: 600;\n    letter-spacing: 1px;\n    text-transform: uppercase;\n  }\n  .comp-row .val .star { margin-right: 2px; }\n\n  .skills {\n    font-size: var(--body);\n    line-height: 1.6;\n    color: var(--ink);\n  }\n  .skills .dot {\n    color: var(--maroon);\n    margin: 0 4px;\n  }\n\n  /* ============================================================\n     RIGHT MAIN COLUMN\n     ============================================================ */\n  .main {\n    padding: 15mm 15mm 15mm 10mm;\n    display: flex;\n    flex-direction: column;\n    gap: 5mm;\n    min-width: 0;\n  }\n\n  .eyebrow {\n    font-size: var(--eyebrow);\n    font-weight: 700;\n    letter-spacing: 2px;\n    color: var(--maroon);\n    text-transform: uppercase;\n  }\n\n  .title {\n    font-size: var(--title);\n    font-weight: 700;\n    color: var(--ink);\n    line-height: 1.1;\n    letter-spacing: -0.4px;\n    margin-top: 2mm;\n  }\n  .title .arrow {\n    color: var(--maroon);\n    font-weight: 700;\n    margin: 0 4px;\n  }\n\n  .subtitle {\n    font-size: var(--subtitle);\n    color: var(--maroon);\n    margin-top: 1.5mm;\n    font-weight: 500;\n    letter-spacing: 0.1px;\n  }\n\n  .header-rule {\n    margin-top: 4mm;\n    border-bottom: 1px solid var(--rule);\n  }\n\n  /* Section in main column */\n  .sec-h {\n    font-size: var(--section);\n    font-weight: 700;\n    letter-spacing: 1px;\n    color: var(--maroon);\n    text-transform: uppercase;\n    padding-bottom: 1.2mm;\n    border-bottom: 1pt solid var(--maroon);\n    margin-bottom: 2.5mm;\n  }\n\n  .sec {\n    /* tight density */\n  }\n  .sec + .sec { margin-top: 0; } /* gap is on parent */\n\n  .sec-body {\n    font-size: var(--body);\n    line-height: 1.5;\n    color: var(--ink);\n  }\n  .sec-body p + p { margin-top: 1.8mm; }\n\n  ul.bullets {\n    list-style: none;\n    font-size: var(--body);\n    line-height: 1.5;\n    color: var(--ink);\n  }\n  ul.bullets li {\n    position: relative;\n    padding-left: 4.5mm;\n  }\n  ul.bullets li + li { margin-top: 1mm; }\n  ul.bullets li::before {\n    content: \"\";\n    position: absolute;\n    left: 0;\n    top: 0.45em;\n    width: 5px;\n    height: 5px;\n    background: var(--maroon);\n  }\n\n  /* Performance trajectory rows */\n  .traj {\n    display: grid;\n    grid-template-columns: 16mm 22mm 1fr;\n    column-gap: 4mm;\n    row-gap: 1.5mm;\n    font-size: var(--body);\n    line-height: 1.45;\n  }\n  .traj .yr { color: var(--maroon); font-weight: 600; }\n  .traj .rt { color: var(--ink); font-weight: 600; }\n  .traj .desc { color: var(--sub); }\n\n  /* Two-column dev plan grid */\n  .twocol {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    column-gap: 6mm;\n    row-gap: 1mm;\n  }\n\n  /* Footer-ish closing line */\n  .closing {\n    margin-top: auto;\n    padding-top: 4mm;\n    border-top: 1px solid var(--rule);\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    font-size: 7.5pt;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: var(--sub);\n  }\n  .closing .right { color: var(--maroon); font-weight: 600; }\n\n  /* Sidebar closing */\n  .side-foot {\n    margin-top: auto;\n    padding-top: 4mm;\n    font-size: 7pt;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: var(--sub);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <article class=\"page\" data-screen-label=\"01 Promotion Profile\">\n\n    <!-- =================== LEFT SIDEBAR =================== -->\n    <aside class=\"sidebar\">\n\n      <div class=\"photo\"><img src=\"f2851c30-81e0-4dee-a815-bede6b2d04f2\" alt=\"Nonpawit Saisuwan\"><\u002Fdiv>\n\n      <div class=\"ident\">\n        <div class=\"name\">Nonpawit<br>Saisuwan<\u002Fdiv>\n        <div class=\"role\">\n          <strong>Department Manager<\u002Fstrong>\n          CMG Online — Order Management\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <section class=\"side-section\">\n        <div class=\"side-h\">Contact<\u002Fdiv>\n        <div class=\"side-body\">\n          <span class=\"contact-line\">Bangna DC, KM.21<\u002Fspan>\n          <span class=\"contact-line\">Thailand<\u002Fspan>\n          <span class=\"contact-line\">sanonpawit@central.co.th<\u002Fspan>\n          <span class=\"contact-line muted\">Employee ID&nbsp;·&nbsp;20241332<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"side-section\">\n        <div class=\"side-h\">Education<\u002Fdiv>\n        <div class=\"side-body\">\n          <p>\n            <strong>B.Eng., Silpakorn University<\u002Fstrong><br>\n            <span class=\"muted\">Management Engineering &amp; Logistics<\u002Fspan>\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"side-section\">\n        <div class=\"side-h\">Experience<\u002Fdiv>\n        <div class=\"side-body\">\n          <div class=\"exp-block\">\n            <div class=\"org\">CMG Online<\u002Fdiv>\n            <div class=\"pos\">Department Manager<\u002Fdiv>\n            <div class=\"yrs\">Nov 2022 — Present<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"exp-block\">\n            <div class=\"org\">SC Group<\u002Fdiv>\n            <div class=\"pos\">Analyst, Transportation<\u002Fdiv>\n            <div class=\"yrs\">2014 — 2022 · 9 yrs<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"side-section\">\n        <div class=\"side-h\">Competencies<\u002Fdiv>\n        <div class=\"side-body\">\n          <div class=\"comp-row\">\n            <span class=\"lab\">Leading Innovation<\u002Fspan>\n            <span class=\"val high\"><span class=\"star\">★<\u002Fspan>High<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"comp-row\">\n            <span class=\"lab\">Profitable Growth<\u002Fspan>\n            <span class=\"val\">Medium<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"comp-row\">\n            <span class=\"lab\">Customer Satisfaction<\u002Fspan>\n            <span class=\"val\">Medium<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"comp-row\">\n            <span class=\"lab\">Org Excellence<\u002Fspan>\n            <span class=\"val\">Medium<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"comp-row\">\n            <span class=\"lab\">Sustainable Collab.<\u002Fspan>\n            <span class=\"val\">Medium<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"comp-row\">\n            <span class=\"lab\">Developing People<\u002Fspan>\n            <span class=\"val\">Medium<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"side-section\">\n        <div class=\"side-h\">Technical Skills<\u002Fdiv>\n        <div class=\"side-body skills\">Python·Node.js·BigQuery·\nAutomation·AI Tools·Vibe Coding·Data Pipelines<\u002Fdiv>\n      <\u002Fsection>\n\n      <div class=\"side-foot\">Promotion Profile · 2026<\u002Fdiv>\n\n    <\u002Faside>\n\n    <!-- =================== RIGHT MAIN =================== -->\n    <main class=\"main\">\n\n      <header>\n        <div class=\"eyebrow\">Promotion Profile<\u002Fdiv>\n        <h1 class=\"title\">\n          Career Path Advancement\n        <\u002Fh1>\n        <div class=\"subtitle\">Data Intelligence &amp; Optimization<\u002Fdiv>\n        <div class=\"header-rule\"><\u002Fdiv>\n      <\u002Fheader>\n\n      <section class=\"sec\">\n        <h2 class=\"sec-h\">Executive Summary<\u002Fh2>\n        <div class=\"sec-body\">\n          <p>Department Manager at CMG Online with proven operational delivery at scale, consistently expanding scope into data intelligence, automation, and analytics engineering. Combines an engineering foundation with hands-on initiative beyond formal mandate — positioned to lead division-wide Data Intelligence &amp; Optimization transformation.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <h2 class=\"sec-h\">What Has Been Built and Led<\u002Fh2>\n        <div class=\"sec-body\">\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">Automation.<\u002Fstrong> Led the implementation of the <strong>Autorunwave<\u002Fstrong> system — an automated wave processing engine that replaced manual wave creation and scaled platform-specific order handling. Established automated campaign reporting workflows with scheduled exception alerting integrated into LINE for the operations team.<\u002Fp>\n\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">Conversational Operations.<\u002Fstrong> Led <strong>Project Dobybot<\u002Fstrong> — a LINE-based operations assistant that lets the team query orders, stock, and campaign status through natural conversation, reducing dependency on dashboards and manual lookups during high-volume periods.<\u002Fp>\n\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">Data Infrastructure.<\u002Fstrong> Built and integrated operational data pipelines into <strong>Google BigQuery<\u002Fstrong>, creating scalable reporting infrastructure for the department. Developed Python and Node.js automation scripts that replaced repetitive manual reporting work and improved data accessibility for cross-functional decisions.<\u002Fp>\n\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">Internal Tools.<\u002Fstrong> Personally developed <strong>cmg-stock-control<\u002Fstrong> — an internal stock management tool deployed on production infrastructure — addressing a real operational need that previously relied on manual coordination. Designed Stock Dashboard and Q2 Consumable Forecast systems supporting both warehouse readiness and brand-level monitoring.<\u002Fp>\n\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">Operational Excellence.<\u002Fstrong> Built operational tracking and reporting solutions for real-time campaign visibility, including hourly tracking reports and automated dashboards that enabled faster decision-making and proactive identification of order fluctuations and bottlenecks.<\u002Fp>\n\n          <p><strong style=\"color:var(--maroon); letter-spacing:0.5px;\">KPI &amp; SLA Performance Monitoring.<\u002Fstrong> Enhanced KPI/SLA monitoring frameworks to improve operational visibility and service performance tracking — supporting proactive issue identification, faster escalation, and operational stability during campaign and high-volume periods.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <h2 class=\"sec-h\">Performance Trajectory<\u002Fh2>\n        <div class=\"traj\">\n          <span class=\"yr\">2024<\u002Fspan>\n          <span class=\"rt\">Rating A−<\u002Fspan>\n          <span class=\"desc\">Exceeding Expectation across operational delivery and campaign execution.<\u002Fspan>\n\n          <span class=\"yr\">2025<\u002Fspan>\n          <span class=\"rt\">Rating B<\u002Fspan>\n          <span class=\"desc\">Meeting Expectation while expanding scope into data intelligence and optimization initiatives.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <h2 class=\"sec-h\">Development Plan — 12 Months<\u002Fh2>\n        <ul class=\"bullets twocol\">\n          <li>People Leadership Expansion<\u002Fli>\n          <li>Strategic Influence at Division Level<\u002Fli>\n          <li>Talent Development for Data-Enabled Ops<\u002Fli>\n          <li>Executive Communication &amp; Business Framing<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <h2 class=\"sec-h\">Career Vision<\u002Fh2>\n        <div class=\"sec-body\">\n          <p>Lead the division's Data Intelligence &amp; Optimization agenda — scalable data architecture, predictive operational monitoring, optimization modeling, and data-driven decision support across CMG Online.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <div class=\"closing\">\n        <span>Prepared for Promotion Committee Review<\u002Fspan>\n        <span class=\"right\">Confidential<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fmain>\n\n  <\u002Farticle>\n\n\n\n<\u002Fbody><\u002Fhtml>"
